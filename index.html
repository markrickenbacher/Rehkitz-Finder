<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Rehkitz Finder</title>

    <meta name="theme-color" content="#0f172a" />
    <meta
      name="description"
      content="QR-basierte GPS-Navigation zu WGS84-Zielkoordinaten"
    />

    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <img src="icons/icon-192.png" alt="Rehkitz Finder Logo" class="hero-logo" />
        <div>
          <h1>Rehkitz Finder</h1>
          <p>QR-Code scannen, Zielpunkt erfassen und direkt hin navigieren.</p>
        </div>
      </header>

      <main class="grid">
        <section class="panel">
          <h2>Suche vorbereiten</h2>

          <div class="actions">
            <button id="startScanBtn">QR scannen</button>
            <button id="startSearchBtn">Suche starten</button>
          </div>

          <div id="reader" class="reader hidden"></div>
          <div id="scanStatus" class="info-box">
            Scanner noch nicht gestartet.
          </div>
          <div id="permissionStatus" class="info-box">
            Standort und Kompass sind noch nicht aktiv.
          </div>
        </section>

        <section class="panel nav-panel">
          <h2>Navigation</h2>
          <div class="nav-grid">
            <div class="arrow-zone">
              <div class="compass">
                <div class="compass-label north">N</div>
                <div class="compass-label east">O</div>
                <div class="compass-label south">S</div>
                <div class="compass-label west">W</div>
                <div id="arrowGlow" class="arrow-glow"></div>
                <div id="arrow" class="big-arrow"></div>
              </div>
            </div>

            <div class="stats">
              <div class="stat">
                <span>Distanz</span>
                <strong id="distanceText">–</strong>
              </div>
              <div class="stat">
                <span>Zielkoordinaten</span>
                <strong id="targetText">–</strong>
              </div>
            </div>
          </div>

          <div id="nearDistanceBox" class="near-distance-box hidden">
            <span>Noch</span>
            <strong id="nearDistanceText">–</strong>
          </div>
        </section>

        <section class="panel map-panel">
          <div class="map-header">
            <h2>Karte</h2>
            <button id="centerMapBtn" class="secondary small">
              Auf Ziel zentrieren
            </button>
          </div>
          <div id="map"></div>
        </section>

        <section class="panel">
          <h2>Suche beenden</h2>
          <div class="actions">
            <button id="sendLocationBtn">Fundort senden</button>
          </div>
          <div id="sendStatus" class="info-box">
            Noch kein Fundort gesendet.
          </div>
          <iframe name="hidden_iframe" class="hidden"></iframe>
        </section>
      </main>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="app.js"></script>
  </body>
</html>
